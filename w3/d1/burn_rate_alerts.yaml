groups:
# ==========================================
# 1. API SERVICE ALERTS (Group 1)
# ==========================================
- name: api-slo
  rules:
  - alert: api_burn_rate_tier1
    expr: |
      (sum(rate(http_requests_fail_total[1h])) / sum(rate(http_requests_total[1h]))) / (1 - 0.999) >= 14.4
      AND
      (sum(rate(http_requests_fail_total[5m])) / sum(rate(http_requests_total[5m]))) / (1 - 0.999) >= 14.4
    labels: {severity: page, tier: "1", service: "api"}
  - alert: api_burn_rate_tier2
    expr: |
      (sum(rate(http_requests_fail_total[6h])) / sum(rate(http_requests_total[6h]))) / (1 - 0.999) >= 6
      AND
      (sum(rate(http_requests_fail_total[30m])) / sum(rate(http_requests_total[30m]))) / (1 - 0.999) >= 6
    labels: {severity: page, tier: "2", service: "api"}
  - alert: api_burn_rate_tier3
    expr: |
      (sum(rate(http_requests_fail_total[3d])) / sum(rate(http_requests_total[3d]))) / (1 - 0.999) >= 1
      AND
      (sum(rate(http_requests_fail_total[6h])) / sum(rate(http_requests_total[6h]))) / (1 - 0.999) >= 1
    labels: {severity: ticket, tier: "3", service: "api"}

# ==========================================
# 2. DATABASE SERVICE ALERTS (Group 2)
# ==========================================
- name: db-slo
  rules:
  - alert: db_burn_rate_tier1
    expr: |
      (sum(rate(db_queries_fail_total[1h])) / sum(rate(db_queries_total[1h]))) / (1 - 0.9995) >= 14.4
      AND
      (sum(rate(db_queries_fail_total[5m])) / sum(rate(db_queries_total[5m]))) / (1 - 0.9995) >= 14.4
    labels: {severity: page, tier: "1", service: "db"}
  - alert: db_burn_rate_tier2
    expr: |
      (sum(rate(db_queries_fail_total[6h])) / sum(rate(db_queries_total[6h]))) / (1 - 0.9995) >= 6
      AND
      (sum(rate(db_queries_fail_total[30m])) / sum(rate(db_queries_total[30m]))) / (1 - 0.9995) >= 6
    labels: {severity: page, tier: "2", service: "db"}
  - alert: db_burn_rate_tier3
    expr: |
      (sum(rate(db_queries_fail_total[3d])) / sum(rate(db_queries_total[3d]))) / (1 - 0.9995) >= 1
      AND
      (sum(rate(db_queries_fail_total[6h])) / sum(rate(db_queries_total[6h]))) / (1 - 0.9995) >= 1
    labels: {severity: ticket, tier: "3", service: "db"}

# ==========================================
# 3. FRONTEND SERVICE ALERTS (Group 3)
# ==========================================
- name: frontend-slo
  rules:
  - alert: frontend_burn_rate_tier1
    expr: |
      (sum(rate(frontend_rum_events_fail_total[1h])) / sum(rate(frontend_rum_events_total[1h]))) / (1 - 0.99) >= 14.4
      AND
      (sum(rate(frontend_rum_events_fail_total[5m])) / sum(rate(frontend_rum_events_total[5m]))) / (1 - 0.99) >= 14.4
    labels: {severity: page, tier: "1", service: "frontend"}
  - alert: frontend_burn_rate_tier2
    expr: |
      (sum(rate(frontend_rum_events_fail_total[6h])) / sum(rate(frontend_rum_events_total[6h]))) / (1 - 0.99) >= 6
      AND
      (sum(rate(frontend_rum_events_fail_total[30m])) / sum(rate(frontend_rum_events_total[30m]))) / (1 - 0.99) >= 6
    labels: {severity: page, tier: "2", service: "frontend"}
  - alert: frontend_burn_rate_tier3
    expr: |
      (sum(rate(frontend_rum_events_fail_total[3d])) / sum(rate(frontend_rum_events_total[3d]))) / (1 - 0.99) >= 1
      AND
      (sum(rate(frontend_rum_events_fail_total[6h])) / sum(rate(frontend_rum_events_total[6h]))) / (1 - 0.99) >= 1
    labels: {severity: ticket, tier: "3", service: "frontend"}