global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: services
    static_configs:
      - targets:
          - frontend:8080
          - api-gateway:8080
          - payment-svc:8080
          - inventory-svc:8080
          - notification-svc:8080
          - checkout-svc:8080
          - auth-svc:8080
          - payment-db:8080
          - log-collector:8080
          - dns-resolver:8080
          - cache-svc:8080
    relabel_configs:
      - source_labels: [__address__]
        regex: "([^:]+):.*"
        target_label: service
        replacement: "$1"

  - job_name: pipeline
    static_configs:
      - targets: ["pipeline:8000"]

